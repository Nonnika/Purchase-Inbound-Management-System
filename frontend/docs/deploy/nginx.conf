# =============================================================================
# PIMS 前端 Nginx 配置
# - 托管 Vite 构建的 SPA 静态资源
# - /api/ 反代到后端容器（compose 服务名 backend，端口 8080）
# - SPA history 路由回退到 index.html
# =============================================================================

server {
    listen       80;
    server_name  _;

    # 静态资源根目录
    root   /usr/share/nginx/html;
    index  index.html;

    # 上传体积（如后续有导入功能可调大）
    client_max_body_size 20m;

    # ---------- API 反代 ----------
    # 注意：proxy_pass 不带末尾斜杠，nginx 会原样转发完整 URI（含 /api），
    # 后端路由注册在 /api 下，故需保留 /api 前缀。
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # ---------- SPA 静态资源 ----------
    # 带 hash 的静态资源长缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 其余路径回退到 index.html（react-router browser router）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 关闭 favicon 404 噪音
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
