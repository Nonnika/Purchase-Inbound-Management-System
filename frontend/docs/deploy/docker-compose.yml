# =============================================================================
# PIMS Docker Compose 部署编排
# 用法：将本文件复制到【仓库根目录】后执行 `docker compose up -d --build`
# （相对路径 ./frontend/... 均以仓库根目录为基准，故必须放在根目录运行）
# 环境变量从同目录的 .env 读取（复制 .env.example 为 .env 后修改）
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # MySQL 8.0：init.sql 烤进镜像（Dockerfile.db），首次启动自动执行建表 + 角色 + 管理员
  # ---------------------------------------------------------------------------
  db:
    build:
      context: .
      dockerfile: frontend/docs/deploy/Dockerfile.db
    container_name: pims-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-pims}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_PASSWD}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    expose:
      - "3306"
    networks:
      - pims-net

  # ---------------------------------------------------------------------------
  # Go 后端：多阶段构建，等 MySQL 健康后启动，监听 :8080
  # 后端 config.go 通过 DB_ADDR 读取数据库地址（compose 服务名 db）
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: frontend/docs/deploy/Dockerfile.backend
    container_name: pims-backend
    restart: unless-stopped
    environment:
      DB_ADDR: db                 # compose 服务名，指向 MySQL 容器（后端读 DB_ADDR）
      DB_PORT: "3306"             # 容器内 MySQL 端口（非主机映射端口）
      DB_NAME: ${DB_NAME:-pims}
      DB_USER: root
      DB_PASSWD: ${DB_PASSWD}
      DB_PARAMS: "charset=utf8mb4&parseTime=true&loc=Local"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-Nonnika.Y}
      TZ: Asia/Shanghai
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    networks:
      - pims-net

  # ---------------------------------------------------------------------------
  # 前端：多阶段构建（Node 编译 → Nginx 托管静态资源 + 反代 /api 到后端）
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: frontend/docs/deploy/Dockerfile.frontend
    container_name: pims-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - pims-net

volumes:
  db_data:

networks:
  pims-net:
    driver: bridge
